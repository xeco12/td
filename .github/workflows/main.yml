name: Build TDLib for Android

# Bu workflow'u manuel olarak Actions sekmesinden tetikleyebilirsin (workflow_dispatch),
# istersen main branch'e push'ta otomatik de çalışmasını sağlayabilirsin (push bloğunu aç).
on:
  workflow_dispatch:
    inputs:
      td_commit:
        description: "Derlenecek tdlib/td commit/branch/tag (boş bırakılırsa master kullanılır)"
        required: false
        default: "master"
  # push:
  #   branches: [ main ]

jobs:
  build-tdlib-android:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout tdlib/td kaynak kodunu klonla
        uses: actions/checkout@v4
        with:
          repository: tdlib/td
          ref: ${{ github.event.inputs.td_commit || 'master' }}
          path: td

      - name: Gerekli sistem araçlarını kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            php-cli \
            perl \
            gperf \
            unzip \
            wget \
            git \
            zlib1g-dev

      - name: Java (JDK) kur
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Ortamı kontrol et (check-environment.sh)
        working-directory: td/example/android
        run: |
          chmod +x *.sh
          ./check-environment.sh || true

      - name: Android SDK indir (fetch-sdk.sh)
        working-directory: td/example/android
        run: ./fetch-sdk.sh

      - name: OpenSSL'i Android için derle (build-openssl.sh)
        working-directory: td/example/android
        run: ./build-openssl.sh

      - name: TDLib'i Android için derle (build-tdlib.sh)
        working-directory: td/example/android
        run: ./build-tdlib.sh

      - name: Derlenen native kütüphaneleri ve Java kodunu artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-android-build
          path: |
            td/example/android/tdlib/libs/**
            td/example/android/tdlib/java/**
            td/example/android/tdlib/tdlib.zip
            td/example/android/tdlib/tdlib-debug.zip
          if-no-files-found: warn
          retention-days: 30

      - name: Derleme özeti
        run: |
          echo "## TDLib Android Derleme Tamamlandı" >> $GITHUB_STEP_SUMMARY
          echo "Artifact: tdlib-android-build" >> $GITHUB_STEP_SUMMARY
          echo "İçerik: native .so dosyaları (tdlib/libs) + Java/JNI kodu (tdlib/java)" >> $GITHUB_STEP_SUMMARY
          find td/example/android/tdlib -type f -name "*.so" >> $GITHUB_STEP_SUMMARY || true
          
